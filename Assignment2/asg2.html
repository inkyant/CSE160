<!DOCTYPE html>
<!-- Anthony Furman apfurman. -->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Assignment 2</title>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>  
    <p>
      <button id="animButton">Play Animation</button>
    </p>
    <p>
        Thigh Angle <input type="range" min="0" max="60" value="0" class="slider" id="thighSlider"/>
    </p>
    <p>
        Calf Angle <input type="range" min="0" max="60" value="0" class="slider" id="calfSlider"/>
    </p>
    <p>
        Head Angle <input type="range" min="60" max="80" value="70" class="slider" id="headSlider"/>
    </p>
    <p>
        Eye Spin <input type="range" min="0" max="360" value="0" class="slider" id="eyeSlider"/>
    </p>
    <p>
        Body X <input type="range" min="0" max="100" value="50" class="slider" id="bodyXSlider"/>
    </p>
    <p>
        Body Y <input type="range" min="0" max="50" value="25" class="slider" id="bodyYSlider"/>
    </p>
    <p>
        Body Angle <input type="range" min="0" max="60" value="30" class="slider" id="bodyAngleSlider"/>
    </p>
    <p>
        Spin Crystals <input type="range" min="0" max="50" value="0" class="slider" id="rubySlider"/>
    </p>
    <p>
        Pitch <input type="range" min="0" max="360" value="340" class="slider" id="viewSliderPitch"/>
    </p>
    <p>
        Yaw <input type="range" min="0" max="360" value="340" class="slider" id="viewSliderYaw"/>
    </p>

    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/cuon-matrix.js"></script>
    <script src="asg2.js"></script>
    <script src="Cube.js"></script>
    <script src="Octahedron.js"></script>
  </body>
</html>
